services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped

    # =====================================================================
    # Variáveis de ambiente — coloque suas chaves no arquivo .env
    # =====================================================================
    env_file:
      - .env

    environment:
      # UID/GID do host para permissões corretas no volume (opcional)
      # HERMES_UID: "1000"
      # HERMES_GID: "1000"
      PYTHONUNBUFFERED: "1"

    # =====================================================================
    # Volume persistente — configurações, memórias e skills ficam aqui
    # =====================================================================
    volumes:
      - hermes_data:/opt/data
      # Descomente para montar o workspace local dentro do container:
      # - ./workspace:/opt/data/workspace

    # =====================================================================
    # Porta para o gateway web (Telegram, Discord, WhatsApp, etc.)
    # =====================================================================
    ports:
      - "8080:8080"   # Gateway web / API

    stdin_open: true
    tty: true

    # Comando padrão: inicia o gateway
    command: ["gateway", "start"]

  dashboard:
    build:
      context: ./dashboard
    image: hermes-dashboard:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - HERMES_CONTAINER=hermes-agent
      - HERMES_ENV_FILE=/hermes_env/.env
      - DASHBOARD_PORT=3000
    volumes:
      # Acesso ao socket docker para controlar o container do hermes (start/stop/logs)
      - /var/run/docker.sock:/var/run/docker.sock
      # Mapeia a pasta local onde o .env está na máquina host
      - .:/hermes_env

volumes:
  hermes_data:
    driver: local
